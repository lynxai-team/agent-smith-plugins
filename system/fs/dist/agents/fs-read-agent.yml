tool:
    description: Filesystem read and explore agent
    arguments:
        prompt: 
            description: "The operation to perform: open a file, list files in a directory, ask a question about a file"
description: A read only agent
category: "system/filesystem"
prompt: |-
    {prompt}
model: qwen4b
inferParams:
  top_p: 1
  min_p: 0.01
  temperature: 0.7
mcp:
  filesystem:
    command: npx
    arguments:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
    tools:
      - list_directory
      - list_directory_with_sizes
      - read_text_file
      - read_multiple_files?
      - search_files?
      - directory_tree?